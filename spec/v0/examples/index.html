<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fide Context Protocol Examples</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --panel: #ffffff;
      --panel-2: #f4f4f5;
      --text: #09090b;
      --muted: #71717a;
      --border: #e4e4e7;
      --accent: #18181b;
      --accent-soft: #e4e4e7;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    }

    a {
      color: inherit;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 24px 20px 20px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .sidebar h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
      line-height: 1.1;
    }

    .sidebar p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .search {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      background: #fff;
      color: var(--text);
      margin-bottom: 16px;
    }

    .example-list {
      display: grid;
      gap: 10px;
    }

    .example-link {
      width: 100%;
      text-align: left;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .example-link.active {
      border-color: var(--accent);
      background: var(--panel-2);
    }

    .example-link-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .example-link-meta {
      color: var(--muted);
      font-size: 0.83rem;
      line-height: 1.4;
    }

    .content {
      padding: 28px;
    }

    .hero,
    .statement-card,
    .legend {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero h2 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1;
    }

    .hero p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
      max-width: 72ch;
    }

    .meta-row,
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .meta-pill,
    .tag,
    .corner-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.82rem;
    }

    .meta-pill {
      background: var(--panel-2);
      color: var(--text);
    }

    .tag {
      background: var(--accent-soft);
      color: var(--text);
    }

    .legend {
      padding: 16px 18px;
      margin-bottom: 20px;
    }

    .legend h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .legend p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .statements {
      display: grid;
      gap: 18px;
    }

    .statement-card {
      padding: 20px;
    }

    .statement-top {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .statement-index {
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .statement-notes {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .triple {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 60px minmax(0, 1fr) 60px minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
      margin-top: 16px;
    }

      .node {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel);
        padding: 14px;
        min-width: 0;
        display: grid;
        grid-template-rows: auto auto;
        gap: 12px;
      }

      .node-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

    .node-label {
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .corner-pill {
      background: var(--panel-2);
      color: var(--text);
      justify-self: end;
    }

    .corner-pill.subtle {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 0.75rem;
    }

      .node-value {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.88rem;
        line-height: 1.5;
        word-break: break-word;
      }

      .node-reference {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .node-reference-id {
        min-width: 0;
        border: 0;
        background: transparent;
        padding: 0;
        margin: 0;
        color: inherit;
        text-align: left;
        cursor: pointer;
        font: inherit;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.82rem;
        line-height: 1.45;
      }

      .node-reference-id-text {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .node-reference-id.expanded .node-reference-id-text {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        word-break: break-word;
      }

    .arrow {
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 1.5rem;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .content {
        padding: 18px;
      }
    }

    @media (max-width: 760px) {
      .triple {
        grid-template-columns: 1fr;
      }

      .arrow {
        transform: rotate(90deg);
        min-height: 28px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>FCP Examples</h1>
      <p>
        Browse the current context-protocol examples and inspect each statement as a structured
        subject-property-object graph.
      </p>
      <input id="search" class="search" type="search" placeholder="Filter by title, tag, or file" />
      <div id="example-list" class="example-list"></div>
    </aside>
    <main class="content">
      <section id="hero" class="hero"></section>
      <section id="statements" class="statements"></section>
    </main>
  </div>
  <script>
    const EXAMPLE_FILES = [
      "classification.json",
      "commerce.json",
      "creative-works.json",
      "decision.json",
      "disagreement.json",
      "education.json",
      "employment.json",
      "events.json",
      "identity.json",
      "organizations.json",
      "planning.json",
      "provenance.json",
      "supersession.json",
    ];

    const exampleList = document.getElementById("example-list");
    const hero = document.getElementById("hero");
    const statements = document.getElementById("statements");
    const search = document.getElementById("search");

    let examples = [];
    let selected = null;
    let query = "";

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function filteredExamples() {
      const q = query.trim().toLowerCase();
      if (!q) return examples;
      return examples.filter((example) =>
        [example.title, example.filename, example.description, ...(example.tags || [])]
          .join(" ")
          .toLowerCase()
          .includes(q),
      );
    }

    function renderList() {
      const items = filteredExamples();
      if (!selected || !items.some((item) => item.filename === selected.filename)) {
        selected = items[0] || examples[0] || null;
      }

      exampleList.innerHTML = items.length
        ? items
          .map(
            (example) => `
                  <button class="example-link ${example.filename === selected.filename ? "active" : ""}" data-file="${escapeHtml(example.filename)}">
                    <div class="example-link-title">${escapeHtml(example.title)}</div>
                    <div class="example-link-meta">
                      ${escapeHtml(example.filename)}<br />
                      ${example.statements.length} statements
                    </div>
                  </button>
                `,
          )
          .join("")
        : `<div class="empty">No examples match this filter.</div>`;

      exampleList.querySelectorAll(".example-link").forEach((button) => {
        button.addEventListener("click", () => {
          const next = examples.find((example) => example.filename === button.dataset.file);
          if (next) {
            selected = next;
            render();
          }
        });
      });
    }

      function renderHero() {
      if (!selected) {
        hero.innerHTML = `
            <div class="eyebrow">Example Viewer</div>
            <h2>No examples loaded</h2>
            <p>Start a local web server in this directory so the page can fetch the JSON files.</p>
          `;
        return;
      }

      hero.innerHTML = `
          <div class="eyebrow">Example Viewer</div>
          <h2>${escapeHtml(selected.title)}</h2>
          <p>${escapeHtml(selected.description || "")}</p>
          <div class="meta-row">
            <span class="meta-pill">File: ${escapeHtml(selected.filename)}</span>
            <span class="meta-pill">Spec Version: ${escapeHtml(selected.specVersion || "?")}</span>
            <span class="meta-pill">${selected.statements.length} statements</span>
          </div>
          <div class="tag-row" style="margin-top: 14px;">
            ${(selected.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
          </div>
        `;
      }

      function roleKey(role) {
        return [role.entityType, role.referenceType, role.referenceIdentifier].join("||");
      }

      function buildNameMap(example) {
        const map = new Map();
        for (const statement of example.statements || []) {
          if (
            statement.property?.referenceIdentifier === "https://schema.org/name" &&
            statement.object?.entityType === "TextLiteral"
          ) {
            map.set(roleKey(statement.subject), statement.object.referenceIdentifier);
          }
        }
        return map;
      }

      function renderNode(label, role, nameMap) {
        const resolvedName = nameMap.get(roleKey(role));
        const referenceDisplay = resolvedName
          ? `<strong>${escapeHtml(resolvedName)}</strong> <span aria-hidden="true">|</span> ${escapeHtml(role.referenceIdentifier)}`
          : escapeHtml(role.referenceIdentifier);

        return `
          <div class="node">
            <div class="node-header">
              <div class="node-label">${escapeHtml(label)}</div>
              <div class="corner-pill">${escapeHtml(role.entityType)}</div>
            </div>
            <div class="node-reference">
              <div class="corner-pill subtle">${escapeHtml(role.referenceType)}</div>
              <button class="node-reference-id" type="button" title="Click to expand or collapse">
                <span class="node-reference-id-text">${referenceDisplay}</span>
              </button>
            </div>
          </div>
        `;
      }

      function renderStatements() {
        if (!selected) {
          statements.innerHTML = `<div class="empty">No example data is available.</div>`;
          return;
        }

        const nameMap = buildNameMap(selected);

        statements.innerHTML = selected.statements
          .map(
            (statement) => `
              <article class="statement-card">
                <div class="statement-top">
                  <div class="statement-index">Batch Statement ${escapeHtml(statement.batch_index)}</div>
                </div>
                <p class="statement-notes">${escapeHtml(statement.notes || "")}</p>
                <div class="triple">
                  ${renderNode("Subject", statement.subject, nameMap)}
                  <div class="arrow">→</div>
                  ${renderNode("Property", statement.property, nameMap)}
                  <div class="arrow">→</div>
                  ${renderNode("Object", statement.object, nameMap)}
                </div>
              </article>
            `,
          )
          .join("");

        statements.querySelectorAll(".node-reference-id").forEach((button) => {
          button.addEventListener("click", () => {
            button.classList.toggle("expanded");
          });
        });
      }

    function render() {
      renderList();
      renderHero();
      renderStatements();
    }

    async function loadExamples() {
      try {
        const loaded = await Promise.all(
          EXAMPLE_FILES.map(async (filename) => {
            const response = await fetch(filename);
            if (!response.ok) {
              throw new Error(`Failed to load ${filename}: ${response.status}`);
            }
            const data = await response.json();
            return {
              filename,
              title: data.title,
              description: data.description,
              tags: data.tags || [],
              specVersion: data.specVersion,
              statements: data.statements || [],
            };
          }),
        );

        examples = loaded;
        selected = loaded[0] || null;
        render();
      } catch (error) {
        hero.innerHTML = `
            <div class="eyebrow">Example Viewer</div>
            <h2>Failed to load examples</h2>
            <p>${escapeHtml(error.message)}</p>
            <p>Open this page through a local server so the browser can fetch the adjacent JSON files.</p>
          `;
        statements.innerHTML = `<div class="empty">Example data could not be loaded.</div>`;
        exampleList.innerHTML = "";
      }
    }

    search.addEventListener("input", (event) => {
      query = event.target.value;
      render();
    });

    loadExamples();
  </script>
</body>

</html>
